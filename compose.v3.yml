# Airflow 3.x override
# Usage: docker-compose -f compose.yml -f compose.v3.yml up -d
---
x-v3: &v3
  image: blueriver97/airflow:3.1.5
  environment:
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}

services:
  airflow-apiserver:
    extends:
      file: compose.yml
      service: airflow-scheduler
    <<: *v3
    container_name: airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    extends:
      file: compose.yml
      service: airflow-scheduler
    <<: *v3
    container_name: dag-processor
    command: dag-processor
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler: { <<: *v3 }

  airflow-worker:
    <<: *v3
    depends_on:
      airflow-apiserver:
        condition: service_healthy

  airflow-triggerer: { <<: *v3 }
  airflow-init: { <<: *v3 }
  airflow-cli: { <<: *v3 }
  flower: { <<: *v3 }
